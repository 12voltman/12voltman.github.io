<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shop</title>
  <style>
    :root {
      --theme: #1f3694;
      --highlight: #69941f;
      --text: #111111;
      --background: #f2f2f2;
      --card-bg: #ffffff;
      --border: #d9d9d9;
      --shadow: 0 8px 24px rgba(0,0,0,0.12);
      --overlay: rgba(0,0,0,0.86);
    }
    @font-face {
      font-family: 'Montserrat';
      src: url("Montserrat-Variable.ttf") format("truetype");
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Montserrat, Helvetica, Arial, sans-serif;
      font-weight: 500;
      background: var(--background);
      color: var(--text);
    }

    .topnav {
      overflow: hidden;
      background-color: var(--theme);
      position: sticky;
      top: 0;
      z-index: 50;
    }

    .topnav a {
      float: left;
      display: block;
      color: var(--background);
      text-align: center;
      padding: 14px 16px;
      text-decoration: none;
      font-size: 17px;
    }

    .topnav a:hover {
      color: var(--highlight);
    }

    .topnav a.active {
      background-color: var(--highlight);
      color: black;
    }

    .topnav .icon {
      display: none;
      height: 20px;
      width: 20px;
    }

    @media screen and (max-width: 700px) {
      .topnav a:not(:first-child) { display: none; }
      .topnav a.icon {
        float: right;
        display: block;
      }
    }

    @media screen and (max-width: 700px) {
      .topnav.responsive { position: relative; }
      .topnav.responsive .icon {
        position: absolute;
        display: inline;
        right: 0;
        top: 0;
      }
      .topnav.responsive a {
        float: none;
        display: block;
        text-align: left;
      }
    }

    .page {
      max-width: 1400px;
      margin: 0 auto;
      padding: 20px 16px 48px;
    }

    .intro {
      margin-bottom: 20px;
    }

    .intro h1 {
      margin-bottom: 8px;
    }

    .store-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 18px;
      align-items: start;
    }

    .product-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      min-height: 100%;
    }

    .product-image-wrap {
      position: relative;
      aspect-ratio: 1 / 1;
      background: #eaeaea;
      overflow: hidden;
      cursor: zoom-in;
    }

    .product-image {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .flip-button {
      position: absolute;
      top: 8px;
      right: 8px;
      border: none;
      background: rgba(255,255,255,0.7);
      backdrop-filter: blur(4px);
      width: 36px;
      height: 36px;
      border-radius: 999px;
      display: none;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 16px;
    }

    .flip-button:focus-visible {
      outline: 3px solid rgba(0,0,0,0.12);
    }

    .product-image-wrap[data-has-back="true"] .flip-button { display: inline-flex; }

    .zoom-flip {
      position: absolute;
      top: 8px;
      right: 56px;
      border: none;
      background: white;
      width: 40px;
      height: 40px;
      border-radius: 999px;
      display: none;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 18px;
      box-shadow: var(--shadow);
    }

    .zoom-overlay.open .zoom-flip { display: inline-flex; }

    .product-body {
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .product-title {
      margin: 0;
      font-size: 1rem;
      line-height: 1.25;
    }

    .product-price {
      margin: 0;
      color: #333;
      font-size: 0.95rem;
    }

    .buy-button {
      display: inline-block;
      width: 100%;
      text-align: center;
      text-decoration: none;
      background: var(--theme);
      color: var(--background);
      border: 0;
      border-radius: 8px;
      padding: 12px 14px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      transition: transform 120ms ease, opacity 120ms ease;
    }

    .buy-button:hover,
    .buy-button:focus-visible {
      opacity: 0.95;
      transform: translateY(-1px);
      outline: none;
    }

    .zoom-overlay {
      position: fixed;
      inset: 0;
      background: var(--overlay);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
      z-index: 100;
      cursor: zoom-out;
    }

    .zoom-overlay.open {
      display: flex;
    }

    .zoom-content {
      position: relative;
      max-width: min(92vw, 1400px);
      max-height: 92vh;
    }

    .zoom-image {
      display: block;
      max-width: 100%;
      max-height: 92vh;
      object-fit: contain;
      border-radius: 10px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.35);
      background: white;
    }

    .zoom-close {
      position: absolute;
      top: -12px;
      right: -12px;
      border: none;
      width: 40px;
      height: 40px;
      border-radius: 999px;
      background: white;
      font-size: 24px;
      cursor: pointer;
      box-shadow: var(--shadow);
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }
  </style>
</head>
<body>
  <div class="topnav" id="myTopnav">
    <a href="index.html">Home</a>
    <a href="services.html">Services</a>
    <a href="cards.html">Cards</a>
    <a href="portfolio.html">Portfolio</a>
    <a href="about.html">About</a>
    <a href="shop.html" class="active">Shop</a>
    <a href="javascript:void(0);" class="icon" onclick="makeResponsive()">
      <svg viewBox="0 0 448 512" fill="currentColor">
        <path fill="currentColor" d="M0 96C0 78.3 14.3 64 32 64H416c17.7 0 32 14.3 32 32s-14.3 32-32 32H32C14.3 128 0 113.7 0 96zM0 256c0-17.7 14.3-32 32-32H416c17.7 0 32 14.3 32 32s-14.3 32-32 32H32c-17.7 0-32-14.3-32-32zM448 416c0 17.7-14.3 32-32 32H32c-17.7 0-32-14.3-32-32s14.3-32 32-32H416c17.7 0 32 14.3 32 32z">
      </svg>
    </a>
  </div>

  <main class="page">
    <section class="intro">
      <h1>Shirts</h1>
      <p>Click any design to zoom. Buy buttons go straight to Stripe checkout.</p>
    </section>

    <section id="store-grid" class="store-grid" aria-label="Product catalog"></section>
  </main>

  <div id="zoomOverlay" class="zoom-overlay" aria-hidden="true">
    <div class="zoom-content">
      <button class="zoom-close" id="zoomClose" aria-label="Close image zoom">×</button>
      <button class="zoom-flip" id="zoomFlip" aria-label="Show back">⇄</button>
      <img id="zoomImage" class="zoom-image" src="" alt="">
    </div>
  </div>

  <template id="productTemplate">
    <article class="product-card">
      <div class="product-image-wrap" tabindex="0" role="button" aria-label="Zoom product image">
        <img class="product-image" src="" alt="">
        <button class="flip-button" type="button" aria-hidden="true" aria-label="Show back">⇄</button>
      </div>
      <div class="product-body">
        <h2 class="product-title"></h2>
        <p class="product-price"></p>
        <a class="buy-button" target="_blank" rel="noopener">Buy</a>
      </div>
    </article>
  </template>

  <script>
    async function loadCSV(path) {
      const res = await fetch(path, { cache: 'no-store' });
      if (!res.ok) throw new Error(`Failed to load ${path} (${res.status})`);
      const text = await res.text();
      return parseCSV(text);
    }

    // Simple CSV parser that handles quoted fields and newlines
    function parseCSV(text) {
      const rows = [];
      let row = [];
      let field = '';
      let inQuotes = false;
      for (let i = 0; i < text.length; i++) {
        const ch = text[i];
        const next = text[i + 1];
        if (inQuotes) {
          if (ch === '"') {
            if (next === '"') { field += '"'; i++; }
            else { inQuotes = false; }
          } else {
            field += ch;
          }
        } else {
          if (ch === '"') { inQuotes = true; }
          else if (ch === ',') { row.push(field); field = ''; }
          else if (ch === '\r') { /* ignore */ }
          else if (ch === '\n') { row.push(field); rows.push(row); row = []; field = ''; }
          else { field += ch; }
        }
      }
      // trailing field/row
      if (inQuotes === false && (field !== '' || row.length)) { row.push(field); rows.push(row); }

      if (rows.length === 0) return [];
      const header = rows.shift().map(h => h.trim().toLowerCase());
      return rows.map(r => {
        const obj = {};
        for (let i = 0; i < header.length; i++) {
          obj[header[i]] = (r[i] || '').trim();
        }
        if (obj.price) obj.price = parseFloat(obj.price) || null;
        return obj;
      });
    }

    function currency(amount) {
      if (amount == null || isNaN(amount)) return '';
      return new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' }).format(amount);
    }

    function renderCatalog(items) {
      const grid = document.getElementById('store-grid');
      const template = document.getElementById('productTemplate');
      grid.innerHTML = '';

      for (const item of items) {
        const node = template.content.cloneNode(true);
        const imageWrap = node.querySelector('.product-image-wrap');
        const image = node.querySelector('.product-image');
        const flipButton = node.querySelector('.flip-button');
        const title = node.querySelector('.product-title');
        const price = node.querySelector('.product-price');
        const buy = node.querySelector('.buy-button');

        const front = item.frontpath || '';
        const back = item.backpath || '';

        image.src = front;
        image.alt = item.title || '';
        image.dataset.front = front;
        if (back) image.dataset.back = back;
        image.dataset.showingBack = 'false';

        if (back) imageWrap.setAttribute('data-has-back', 'true');

        title.textContent = item.title || '';
        price.textContent = item.price != null ? currency(item.price) : '';
        buy.href = item.url || '#';
        buy.textContent = 'Buy';
        buy.setAttribute('aria-label', `Buy ${item.title || ''}`);

        const openZoom = () => showZoomFromImage(image);
        imageWrap.addEventListener('click', openZoom);
        imageWrap.addEventListener('keydown', (event) => {
          if (event.key === 'Enter' || event.key === ' ') {
            event.preventDefault();
            openZoom();
          }
        });

        flipButton.addEventListener('click', (e) => {
          e.stopPropagation();
          toggleFlip(image, flipButton);
        });

        grid.appendChild(node);
      }
    }

    function toggleFlip(image, flipButton) {
      const showingBack = image.dataset.showingBack === 'true';
      if (showingBack) {
        image.src = image.dataset.front || '';
        image.dataset.showingBack = 'false';
        flipButton.setAttribute('aria-label', 'Show back');
      } else {
        if (!image.dataset.back) return;
        image.src = image.dataset.back;
        image.dataset.showingBack = 'true';
        flipButton.setAttribute('aria-label', 'Show front');
      }
    }

    function showZoomFromImage(image) {
      const overlay = document.getElementById('zoomOverlay');
      const zoomImg = document.getElementById('zoomImage');
      const zoomFlip = document.getElementById('zoomFlip');

      zoomImg.src = image.src || '';
      zoomImg.alt = image.alt || '';
      // carry over front/back data for toggling in zoom
      zoomImg.dataset.front = image.dataset.front || '';
      zoomImg.dataset.back = image.dataset.back || '';
      zoomImg.dataset.showingBack = image.dataset.showingBack || 'false';

      if (zoomImg.dataset.back) {
        zoomFlip.style.display = 'inline-flex';
        zoomFlip.setAttribute('aria-hidden', 'false');
        zoomFlip.onclick = (e) => {
          e.stopPropagation();
          toggleZoomFlip(zoomImg);
        };
      } else {
        zoomFlip.style.display = 'none';
        zoomFlip.onclick = null;
      }

      overlay.classList.add('open');
      overlay.setAttribute('aria-hidden', 'false');
      document.body.style.overflow = 'hidden';
    }

    function toggleZoomFlip(zoomImg) {
      const showingBack = zoomImg.dataset.showingBack === 'true';
      if (showingBack) {
        zoomImg.src = zoomImg.dataset.front || '';
        zoomImg.dataset.showingBack = 'false';
        document.getElementById('zoomFlip').setAttribute('aria-label', 'Show back');
      } else {
        if (!zoomImg.dataset.back) return;
        zoomImg.src = zoomImg.dataset.back;
        zoomImg.dataset.showingBack = 'true';
        document.getElementById('zoomFlip').setAttribute('aria-label', 'Show front');
      }
    }

    function hideZoom() {
      const overlay = document.getElementById('zoomOverlay');
      const image = document.getElementById('zoomImage');
      overlay.classList.remove('open');
      overlay.setAttribute('aria-hidden', 'true');
      image.src = '';
      image.alt = '';
      image.dataset.front = '';
      image.dataset.back = '';
      document.getElementById('zoomFlip').style.display = 'none';
      document.body.style.overflow = '';
    }

    function makeResponsive() {
      const x = document.getElementById('myTopnav');
      if (x.className === 'topnav') {
        x.className += ' responsive';
      } else {
        x.className = 'topnav';
      }
    }

    document.getElementById('zoomOverlay').addEventListener('click', (event) => {
      if (event.target.id === 'zoomOverlay') hideZoom();
    });

    document.getElementById('zoomClose').addEventListener('click', hideZoom);

    document.addEventListener('keydown', (event) => {
      if (event.key === 'Escape') hideZoom();
    });

    // load CSV catalog and render
    loadCSV('shop/catalog.csv')
      .then(renderCatalog)
      .catch((error) => {
        console.error(error);
        document.getElementById('store-grid').innerHTML = '<p>Could not load catalog.</p>';
      });
  </script>
</body>
</html>
